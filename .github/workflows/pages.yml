name: Deploy COSMIC archive

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0
          run_install: true
      - run: pnpm build:web
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist
      - id: deployment
        uses: actions/deploy-pages@v5
